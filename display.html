<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Display Screen 16:9 - MAX SIZE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            background-color: #000; overflow: hidden; margin: 0; 
            height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;
        }

        .main-container {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; height: 100%; padding: 0 20px;
        }

        /* 2. ขยายภาพสี่เหลี่ยมจัตุรัสให้เกือบเต็มความสูงจอ */
        .image-frame {
            height: 96vh; /* ขยายเกือบเต็มความสูงจอ */
            aspect-ratio: 1 / 1; 
            overflow: hidden;
            border-radius: 20px;
            border: 10px solid #fff;
            box-shadow: 0 0 100px rgba(255,255,255,0.2);
            background: #111;
        }

        #displayImg { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.8s ease-in-out; }

        /* 2. ขยาย QR Code ให้ใหญ่ขึ้น */
        .qr-side {
            background: white; padding: 25px; border-radius: 30px; text-align: center;
            flex-shrink: 0; margin: 0 10px;
        }

        .qr-label { color: #000; font-weight: 900; margin-top: 15px; font-size: 1.8rem; }
        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="qr-side">
            <div id="qrcodeLeft"></div>
            <p class="qr-label">SCAN TO POST</p>
        </div>

        <div class="image-frame">
            <img id="displayImg" src="" alt="Screen">
        </div>

        <div class="qr-side">
            <div id="qrcodeRight"></div>
            <p class="qr-label">SCAN TO POST</p>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const displayImg = document.getElementById('displayImg');
        const uploadUrl = "https://suchart28.github.io/photoup/"; 
        let currentPhotos = [];
        let slideInterval = null;
        let manualOverride = false;
        let currentMode = 'latest';

        // สร้าง QR Code ขนาดใหญ่ (300px)
        const qrConfig = { text: uploadUrl, width: 300, height: 300, colorDark: "#000", correctLevel: QRCode.CorrectLevel.H };
        new QRCode(document.getElementById("qrcodeLeft"), qrConfig);
        new QRCode(document.getElementById("qrcodeRight"), qrConfig);

        function showImage(url) {
            if (displayImg.src === url) return;
            displayImg.classList.add('fade-out');
            setTimeout(() => {
                displayImg.src = url;
                displayImg.onload = () => displayImg.classList.remove('fade-out');
            }, 800);
        }

        function startSlideshow() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                if (!manualOverride && currentPhotos.length > 0) {
                    const randomIndex = Math.floor(Math.random() * currentPhotos.length);
                    showImage(currentPhotos[randomIndex].url);
                }
            }, 5000);
        }

        // ฟังคำสั่งเปลี่ยนโหมดจาก Admin
        onSnapshot(doc(db, "display", "config"), (docSnap) => {
            if (docSnap.exists()) {
                currentMode = docSnap.data().mode;
                updatePhotoListener();
            }
        });

        let photoUnsubscribe = null;
        function updatePhotoListener() {
            if (photoUnsubscribe) photoUnsubscribe();
            
            const q = currentMode === 'latest' 
                ? query(collection(db, "photos"), orderBy("timestamp", "desc"), limit(10))
                : query(collection(db, "photos"), orderBy("timestamp", "desc"));

            photoUnsubscribe = onSnapshot(q, (snapshot) => {
                currentPhotos = snapshot.docs.map(d => d.data());
                if (!manualOverride && !slideInterval) startSlideshow();
            });
        }

        // Force Display จาก Admin
        onSnapshot(doc(db, "display", "main"), (docSnap) => {
            if (docSnap.exists()) {
                manualOverride = true;
                showImage(docSnap.data().currentImageUrl);
                clearTimeout(window.manualTimer);
                window.manualTimer = setTimeout(() => manualOverride = false, 15000);
            }
        });
    </script>
</body>
</html>
