<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Display Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #000; overflow: hidden; margin: 0; }
        #displayImg { 
            width: 100vw; height: 100vh; object-fit: contain; 
            transition: opacity 1s ease-in-out; 
        }
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }
    </style>
</head>
<body class="relative flex items-center justify-center">

    <img id="displayImg" class="fade-in" src="" alt="Screen">

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const displayImg = document.getElementById('displayImg');
        let latestPhotos = [];
        let currentIndex = 0;
        let slideInterval = null;
        let manualOverride = false;

        // 1. สร้าง QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: "https://suchart28.github.io/photoup/",
            width: 120, height: 120
        });

        // 2. ฟังก์ชันเริ่ม Slide Show
        function startSlideshow() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                if (!manualOverride && latestPhotos.length > 0) {
                    showImage(latestPhotos[currentIndex].url);
                    currentIndex = (currentIndex + 1) % latestPhotos.length;
                }
            }, 5000); // เปลี่ยนรูปทุก 5 วินาที
        }

        function showImage(url) {
            if (displayImg.src === url) return;
            displayImg.classList.add('fade-out');
            setTimeout(() => {
                displayImg.src = url;
                displayImg.onload = () => displayImg.classList.remove('fade-out');
            }, 1000);
        }

        // 3. ดักฟัง 10 รูปล่าสุด (Auto Mode)
        const q = query(collection(db, "photos"), orderBy("timestamp", "desc"), limit(10));
        onSnapshot(q, (snapshot) => {
            latestPhotos = snapshot.docs.map(doc => doc.data()).filter(data => data.url);
            if (!manualOverride && latestPhotos.length > 0 && !slideInterval) {
                startSlideshow();
            }
        });

        // 4. ดักฟังคำสั่งจาก Admin (Manual Mode)
        onSnapshot(doc(db, "display", "main"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                manualOverride = true;
                showImage(data.currentImageUrl);
                
                // หลังจากแสดงภาพที่ Admin สั่ง 15 วินาที ให้กลับไปโหมด Auto
                clearTimeout(window.manualTimer);
                window.manualTimer = setTimeout(() => {
                    manualOverride = false;
                }, 15000);
            }
        });
    </script>
</body>
</html>
