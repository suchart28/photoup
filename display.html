<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display MAX Screen - Chakra Petch Font</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ตั้งค่าฟอนต์หลักของทั้งหน้า */
        body { 
            background-color: #000; 
            overflow: hidden; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw; 
            font-family: 'Chakra Petch', sans-serif; /* ใช้ฟอนต์ Chakra Petch */
        }

        .main-container { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            width: 100%; 
            height: 100%; 
            padding: 0 1.5%; 
        }

        .image-frame { 
            height: 96vh; 
            aspect-ratio: 1 / 1; 
            overflow: hidden; 
            border-radius: 20px; 
            border: 12px solid #fff; 
            box-shadow: 0 0 60px rgba(255,255,255,0.15); 
            background: #111; 
            position: relative;
        }

        #displayImg { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.8s ease-in-out; 
        }

        .qr-side { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 40px; 
            text-align: center; 
            flex-shrink: 0; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .qr-label { 
            color: #000; 
            font-weight: 700; /* Chakra Petch ตัวหนา */
            margin-top: 1.5rem; 
            font-size: 2.8rem; 
            line-height: 1.1;
        }

        .fade-out { opacity: 0; }

        /* หน้าจอตอนปิดระบบ */
        #closedOverlay { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div id="closedOverlay">
        <div class="text-[15rem] mb-10">🚫</div>
        <h1 class="text-white text-8xl font-bold mb-8">ตอนนี้ระบบปิดอยู่</h1>
        <p class="text-gray-400 text-5xl">ต้องการเปิดใช้งานโปรดโทรหา</p>
        <p class="text-yellow-400 text-7xl font-bold mt-6 underline">0817396280</p>
    </div>

    <div class="main-container">
        <div class="qr-side">
            <div id="qrcodeLeft"></div>
            <p class="qr-label">สแกน<br>เพื่อส่งภาพขึ้นจอ</p>
        </div>

        <div class="image-frame">
            <img id="displayImg" src="" alt="Waiting for photos...">
        </div>

        <div class="qr-side">
            <div id="qrcodeRight"></div>
            <p class="qr-label">สแกน<br>เพื่อส่งภาพขึ้นจอ</p>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const displayImg = document.getElementById('displayImg');
        const closedOverlay = document.getElementById('closedOverlay');
        const uploadUrl = "https://suchart28.github.io/photoup/"; 
        
        let currentPhotos = [];
        let slideInterval = null;
        let manualOverride = false;
        let currentMode = 'latest';

        const qrOptions = {
            text: uploadUrl,
            width: 400,
            height: 400,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        };
        new QRCode(document.getElementById("qrcodeLeft"), qrOptions);
        new QRCode(document.getElementById("qrcodeRight"), qrOptions);

        function showImage(url) {
            if (!url || displayImg.src === url) return;
            displayImg.classList.add('fade-out');
            setTimeout(() => {
                displayImg.src = url;
                displayImg.onload = () => displayImg.classList.remove('fade-out');
            }, 800);
        }

        function startSlideshow() {
            if (slideInterval) clearInterval(slideInterval);
            if (currentPhotos.length > 0) {
                const randIdx = Math.floor(Math.random() * currentPhotos.length);
                showImage(currentPhotos[randIdx].url);
            }
            slideInterval = setInterval(() => {
                if (!manualOverride && currentPhotos.length > 0) {
                    const randomIndex = Math.floor(Math.random() * currentPhotos.length);
                    showImage(currentPhotos[randomIndex].url);
                }
            }, 5000);
        }

        onSnapshot(doc(db, "display", "config"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.status === 'closed') {
                    closedOverlay.style.display = 'flex';
                    if (slideInterval) clearInterval(slideInterval);
                    return;
                } else {
                    closedOverlay.style.display = 'none';
                }
                if (currentMode !== data.mode) {
                    currentMode = data.mode || 'latest';
                    updatePhotoListener();
                }
            } else {
                updatePhotoListener();
            }
        });

        let photoUnsubscribe = null;
        function updatePhotoListener() {
            if (photoUnsubscribe) photoUnsubscribe();
            const photoCol = collection(db, "photos");
            let q = query(photoCol, orderBy("timestamp", "desc"));
            if (currentMode === 'latest') {
                q = query(photoCol, orderBy("timestamp", "desc"), limit(10));
            }
            photoUnsubscribe = onSnapshot(q, (snapshot) => {
                currentPhotos = snapshot.docs.map(d => d.data());
                if (currentPhotos.length > 0 && !slideInterval) {
                    startSlideshow();
                }
            });
        }

        onSnapshot(doc(db, "display", "main"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                manualOverride = true;
                showImage(data.currentImageUrl);
                clearTimeout(window.manualTimer);
                window.manualTimer = setTimeout(() => {
                    manualOverride = false;
                }, 15000);
            }
        });
    </script>
</body>
</html>
