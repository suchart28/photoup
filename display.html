<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Display Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #000; overflow: hidden; margin: 0; font-family: sans-serif; }
        #displayImg { width: 100vw; height: 100vh; object-fit: contain; transition: opacity 1s ease-in-out; }
        .fade-out { opacity: 0; }
        .caption-overlay {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 1rem 3rem;
            border-radius: 50px; font-size: 3rem; font-weight: bold;
            max-width: 85%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            z-index: 10; border: 2px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="relative flex items-center justify-center">

    <div class="absolute top-6 z-20 flex flex-col items-center bg-white/90 p-3 rounded-2xl shadow-2xl">
        <div id="qrcode"></div>
        <p class="font-bold mt-2 text-black text-sm">สแกนเพื่อส่งรูป</p>
    </div>

    <div id="captionContainer" class="caption-overlay hidden"></div>
    <img id="displayImg" src="" alt="Screen">

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const displayImg = document.getElementById('displayImg');
        const captionContainer = document.getElementById('captionContainer');
        let latestPhotos = [];
        let currentIndex = 0;
        let slideInterval = null;
        let manualOverride = false;

        new QRCode(document.getElementById("qrcode"), {
            text: "https://suchart28.github.io/photoup/",
            width: 150, height: 150
        });

        function showImage(url, caption) {
            if (displayImg.src === url) return;
            displayImg.classList.add('fade-out');
            setTimeout(() => {
                displayImg.src = url;
                if (caption) {
                    captionContainer.innerText = caption;
                    captionContainer.classList.remove('hidden');
                } else {
                    captionContainer.classList.add('hidden');
                }
                displayImg.onload = () => displayImg.classList.remove('fade-out');
            }, 1000);
        }

        function startSlideshow() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                if (!manualOverride && latestPhotos.length > 0) {
                    const p = latestPhotos[currentIndex];
                    showImage(p.url, p.caption);
                    currentIndex = (currentIndex + 1) % latestPhotos.length;
                }
            }, 6000);
        }

        const q = query(collection(db, "photos"), orderBy("timestamp", "desc"), limit(10));
        onSnapshot(q, (snapshot) => {
            latestPhotos = snapshot.docs.map(doc => doc.data());
            if (!manualOverride && latestPhotos.length > 0 && !slideInterval) startSlideshow();
        });

        onSnapshot(doc(db, "display", "main"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                manualOverride = true;
                showImage(data.currentImageUrl, data.caption);
                clearTimeout(window.manualTimer);
                window.manualTimer = setTimeout(() => { manualOverride = false; }, 15000);
            }
        });
    </script>
</body>
</html>
