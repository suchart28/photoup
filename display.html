<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000; 
            overflow: hidden; 
            margin: 0; 
        }
        #displayImg { 
            width: 100vw; 
            height: 100vh; 
            object-fit: contain; 
            transition: opacity 0.8s ease-in-out;
        }
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }
    </style>
</head>
<body>

    <img id="displayImg" class="fade-in" src="https://via.placeholder.com/1920x1080?text=Waiting+for+Photos..." alt="Screen">

    <div class="absolute bottom-8 right-8 bg-white p-4 rounded-xl shadow-2xl flex flex-col items-center z-10 opacity-90 hover:opacity-100 transition">
        <img src="https://via.placeholder.com/200?text=QR+Code" alt="QR Code" class="w-40 h-40">
        <p class="font-bold mt-2 text-lg text-gray-800">สแกนเพื่อส่งรูป!</p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const displayImg = document.getElementById('displayImg');

        // ฟังก์ชันรับการอัปเดตจาก Admin
        onSnapshot(doc(db, "display", "main"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if(data.currentImageUrl && displayImg.src !== data.currentImageUrl) {
                    
                    // เอฟเฟกต์ค่อยๆ เปลี่ยนรูป (Fade)
                    displayImg.classList.replace('fade-in', 'fade-out');
                    
                    setTimeout(() => {
                        displayImg.src = data.currentImageUrl;
                        
                        // รอให้รูปโหลดเสร็จก่อนค่อยโชว์
                        displayImg.onload = () => {
                            displayImg.classList.replace('fade-out', 'fade-in');
                        };
                    }, 800); // ดีเลย์ให้ภาพเก่าค่อยๆ หายไป
                }
            }
        });
    </script>
</body>
</html>
