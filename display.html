<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Display Screen 16:9 - Random Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            background-color: #050505; 
            overflow: hidden; margin: 0; height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center; font-family: sans-serif;
        }
        .main-container { display: flex; align-items: center; justify-content: space-around; width: 95%; height: 85%; }
        .image-frame {
            height: 80vh; aspect-ratio: 1 / 1; overflow: hidden;
            border-radius: 30px; border: 8px solid #ffffff;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); background: #111;
        }
        #displayImg { width: 100%; height: 100%; object-fit: cover; transition: opacity 1s ease-in-out; }
        .qr-side { background: white; padding: 20px; border-radius: 20px; text-align: center; }
        .qr-label { color: #333; font-weight: bold; margin-top: 10px; font-size: 1.2rem; }
        .fade-out { opacity: 0; }

        /* ส่วนควบคุมโหมดการสุ่ม (มุมซ้ายล่าง) */
        .mode-controls {
            position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        .mode-controls:hover { opacity: 1; }
        .btn-mode { background: rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; font-size: 12px; cursor: pointer; border: 1px solid white; }
        .btn-mode.active { background: #3b82f6; border-color: #3b82f6; }
    </style>
</head>
<body>

    <div class="mode-controls">
        <button id="modeLatest" class="btn-mode active">สุ่ม 10 ภาพล่าสุด</button>
        <button id="modeAll" class="btn-mode">สุ่มภาพทั้งหมด</button>
    </div>

    <div class="main-container">
        <div class="qr-side">
            <div id="qrcodeLeft"></div>
            <p class="qr-label">Scan to Post</p>
        </div>

        <div class="image-frame">
            <img id="displayImg" src="" alt="Screen">
        </div>

        <div class="qr-side">
            <div id="qrcodeRight"></div>
            <p class="qr-label">Scan to Post</p>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, onSnapshot, doc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const displayImg = document.getElementById('displayImg');
        const uploadUrl = "https://suchart28.github.io/photoup/"; 
        let currentPhotos = [];
        let slideInterval = null;
        let manualOverride = false;
        let displayMode = 'latest'; // 'latest' หรือ 'all'

        // สร้าง QR Code
        const qrConfig = { text: uploadUrl, width: 180, height: 180 };
        new QRCode(document.getElementById("qrcodeLeft"), qrConfig);
        new QRCode(document.getElementById("qrcodeRight"), qrConfig);

        function showImage(url) {
            if (displayImg.src === url) return;
            displayImg.classList.add('fade-out');
            setTimeout(() => {
                displayImg.src = url;
                displayImg.onload = () => displayImg.classList.remove('fade-out');
            }, 1000);
        }

        // ฟังก์ชันสุ่มภาพจาก Array
        function pickRandomImage() {
            if (currentPhotos.length > 0) {
                const randomIndex = Math.floor(Math.random() * currentPhotos.length);
                showImage(currentPhotos[randomIndex].url);
            }
        }

        function startSlideshow() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                if (!manualOverride) pickRandomImage();
            }, 5000);
        }

        // ฟังการเปลี่ยนแปลงของข้อมูลตามโหมด
        function updateListener() {
            let q;
            if (displayMode === 'latest') {
                q = query(collection(db, "photos"), orderBy("timestamp", "desc"), limit(10));
            } else {
                q = query(collection(db, "photos"), orderBy("timestamp", "desc"));
            }

            onSnapshot(q, (snapshot) => {
                currentPhotos = snapshot.docs.map(doc => doc.data());
                if (!manualOverride && currentPhotos.length > 0 && !slideInterval) {
                    pickRandomImage();
                    startSlideshow();
                }
            });
        }

        // เปลี่ยนโหมด
        document.getElementById('modeLatest').onclick = (e) => {
            displayMode = 'latest';
            updateButtons(e.target);
            updateListener();
        };
        document.getElementById('modeAll').onclick = (e) => {
            displayMode = 'all';
            updateButtons(e.target);
            updateListener();
        };

        function updateButtons(activeBtn) {
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        updateListener();

        // รับคำสั่ง Force Display จาก Admin
        onSnapshot(doc(db, "display", "main"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                manualOverride = true;
                showImage(data.currentImageUrl);
                clearTimeout(window.manualTimer);
                window.manualTimer = setTimeout(() => { manualOverride = false; }, 15000);
            }
        });
    </script>
</body>
</html>
