<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Display Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            background-color: #0a0a0a; 
            overflow: hidden; 
            margin: 0; 
            font-family: 'sans-serif'; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 1. จัดการกรอบภาพให้เป็นสัดส่วนเดียวกัน (เช่น 4:3 หรือ 1:1) */
        .image-frame {
            width: 80vw;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 24px;
            background: #1a1a1a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 80px; /* เว้นที่ให้ QR Code ด้านบน */
        }

        #displayImg {
            width: 100%;
            height: 100%;
            /* บังคับให้ภาพเต็มกรอบเสมอ ไม่ว่าจะเป็นแนวตั้งหรือแนวนอน */
            object-fit: cover; 
            transition: opacity 1s ease-in-out;
        }

        .fade-out { opacity: 0; }

        /* 2. จัดการ QR Code ไว้ตรงกลางด้านบน เทพื้นขาว */
        .qr-header {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 30px;
            border-radius: 0 0 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
        }
        #qrcode { padding: 5px; }
        .qr-text {
            color: #333;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="qr-header">
        <div id="qrcode"></div>
        <p class="qr-text">📸 สแกนเพื่อส่งรูปภาพ</p>
    </div>

    <div class="image-frame">
        <img id="displayImg" src="" alt="Screen">
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const displayImg = document.getElementById('displayImg');
        let latestPhotos = [];
        let currentIndex = 0;
        let slideInterval = null;
        let manualOverride = false;

        // ตั้งค่า QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: "https://suchart28.github.io/photoup/", // เปลี่ยนเป็น URL ของคุณ
            width: 120,
            height: 120,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function showImage(url) {
            if (displayImg.src === url) return;
            displayImg.classList.add('fade-out');
            setTimeout(() => {
                displayImg.src = url;
                displayImg.onload = () => displayImg.classList.remove('fade-out');
            }, 1000);
        }

        function startSlideshow() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                if (!manualOverride && latestPhotos.length > 0) {
                    const p = latestPhotos[currentIndex];
                    showImage(p.url);
                    currentIndex = (currentIndex + 1) % latestPhotos.length;
                }
            }, 5000);
        }

        const q = query(collection(db, "photos"), orderBy("timestamp", "desc"), limit(10));
        onSnapshot(q, (snapshot) => {
            latestPhotos = snapshot.docs.map(doc => doc.data());
            if (!manualOverride && latestPhotos.length > 0 && !slideInterval) startSlideshow();
        });

        onSnapshot(doc(db, "display", "main"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                manualOverride = true;
                showImage(data.currentImageUrl);
                clearTimeout(window.manualTimer);
                window.manualTimer = setTimeout(() => { manualOverride = false; }, 15000);
            }
        });
    </script>
</body>
</html>
