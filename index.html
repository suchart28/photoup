<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งรูปภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <div class="text-5xl mb-4">📸</div>
        <h1 class="text-2xl font-bold mb-6">ส่งรูปภาพร่วมสนุก</h1>
        
        <input type="file" id="photoInput" accept="image/*" class="hidden">
        
        <button id="uploadBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full w-full shadow-lg transition-all active:scale-95">
            ถ่ายรูป / เลือกรูป
        </button>
        
        <p id="status" class="mt-6 text-sm text-gray-500">เลือกรูปภาพเพื่อส่งขึ้นจอได้เลย!</p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const photoInput = document.getElementById('photoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusTxt = document.getElementById('status');

        uploadBtn.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // เปลี่ยนสถานะปุ่มตอนกำลังโหลด
            statusTxt.innerText = "⏳ กำลังเตรียมรูปภาพ...";
            statusTxt.className = "mt-6 text-sm text-blue-500 font-bold";
            uploadBtn.disabled = true;
            uploadBtn.classList.replace('bg-blue-600', 'bg-gray-400');
            uploadBtn.classList.remove('hover:bg-blue-700');

            try {
                // บีบอัดภาพเพื่อความรวดเร็ว
                const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1080, useWebWorker: true };
                const compressedFile = await imageCompression(file, options);

                const reader = new FileReader();
                reader.readAsDataURL(compressedFile);
                reader.onloadend = async () => {
                    const base64data = reader.result;

                    statusTxt.innerText = "🚀 กำลังส่งรูปภาพ...";

                    // ส่งรูปขึ้น Firebase ทันที
                    await addDoc(collection(db, "photos"), {
                        url: base64data,
                        timestamp: serverTimestamp()
                    });

                    statusTxt.innerText = "✅ ส่งรูปภาพสำเร็จ!";
                    statusTxt.className = "mt-6 text-sm text-green-500 font-bold";
                    
                    // รีเซ็ตปุ่มให้พร้อมส่งรูปต่อไป
                    uploadBtn.disabled = false;
                    uploadBtn.classList.replace('bg-gray-400', 'bg-blue-600');
                    uploadBtn.classList.add('hover:bg-blue-700');
                    photoInput.value = ''; // เคลียร์ไฟล์เพื่อให้เลือกรูปซ้ำได้
                    
                    // กลับไปข้อความเดิมหลังจากผ่านไป 3 วินาที
                    setTimeout(() => {
                        statusTxt.innerText = "ส่งรูปภาพเพิ่มได้เลย!";
                        statusTxt.className = "mt-6 text-sm text-gray-500";
                    }, 3000);
                };
            } catch (error) {
                console.error("Error processing image:", error);
                statusTxt.innerText = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่";
                statusTxt.className = "mt-6 text-sm text-red-500 font-bold";
                
                uploadBtn.disabled = false;
                uploadBtn.classList.replace('bg-gray-400', 'bg-blue-600');
                uploadBtn.classList.add('hover:bg-blue-700');
            }
        });
    </script>
</body>
</html>
