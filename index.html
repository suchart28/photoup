<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งรูปภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <div class="text-5xl mb-4">📸</div>
        <h1 class="text-2xl font-bold mb-6">ส่งรูปภาพร่วมสนุก</h1>
        
        <input type="file" id="photoInput" accept="image/*" class="hidden">
        <button id="uploadBtn" disabled class="bg-gray-400 text-white font-bold py-4 px-8 rounded-full w-full shadow-lg transition-all">
            รอสักครู่ (AI กำลังโหลด...)
        </button>
        
        <p id="status" class="mt-6 text-sm text-gray-500">กรุณาอัปโหลดเฉพาะภาพถ่ายคนเท่านั้น</p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const photoInput = document.getElementById('photoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusTxt = document.getElementById('status');
        let aiModel = null;

        // 1. โหลด AI
        cocoSsd.load().then(model => {
            aiModel = model;
            uploadBtn.disabled = false;
            uploadBtn.innerText = "ถ่ายรูป / เลือกรูป";
            uploadBtn.className = "bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full w-full shadow-lg transition-all active:scale-95";
        });

        uploadBtn.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusTxt.innerText = "⏳ กำลังเตรียมรูปภาพ...";
            statusTxt.className = "mt-6 text-sm text-blue-500 font-bold";
            uploadBtn.disabled = true;

            try {
                // 2. ทำการบีบอัดและแก้ปัญหา EXIF (ภาพกลับหัว) ทันทีที่เลือกรูป
                const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1080, useWebWorker: true };
                const compressedFile = await imageCompression(file, options);

                const reader = new FileReader();
                reader.readAsDataURL(compressedFile);
                reader.onloadend = async () => {
                    const base64data = reader.result;

                    const img = new Image();
                    img.src = base64data;
                    img.onload = async () => {
                        statusTxt.innerText = "🤖 AI กำลังตรวจสอบภาพ...";
                        
                        // 3. ให้ AI ตรวจสอบจากภาพที่ถูกปรับขนาดและตั้งตรงเรียบร้อยแล้ว
                        const predictions = await aiModel.detect(img);
                        const isPerson = predictions.some(p => p.class === 'person');

                        if (!isPerson) {
                            statusTxt.innerText = "❌ ตรวจไม่พบคนในภาพ กรุณาลองใหม่";
                            statusTxt.className = "mt-6 text-sm text-red-500 font-bold";
                            uploadBtn.disabled = false;
                            return;
                        }

                        // 4. ถ้าพบคน ส่งข้อมูลที่บีบอัดแล้วขึ้น Firebase ได้เลย
                        statusTxt.innerText = "🚀 ผ่าน! กำลังส่งรูปภาพ...";
                        await addDoc(collection(db, "photos"), {
                            url: base64data,
                            timestamp: serverTimestamp()
                        });

                        statusTxt.innerText = "✅ ส่งรูปภาพสำเร็จ!";
                        statusTxt.className = "mt-6 text-sm text-green-500 font-bold";
                        uploadBtn.disabled = false;
                    };
                };
            } catch (error) {
                console.error("Error processing image:", error);
                statusTxt.innerText = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่";
                statusTxt.className = "mt-6 text-sm text-red-500 font-bold";
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
