<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งรูปภาพร่วมสนุก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <div class="text-6xl mb-6">📸</div>
        <h1 class="text-2xl font-bold mb-6">ส่งรูปภาพร่วมสนุก</h1>
        <input type="file" id="photoInput" accept="image/*" class="hidden">
        <button id="uploadBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 px-8 rounded-full w-full shadow-lg active:scale-95 transition-all text-xl">
            ถ่ายรูป / เลือกรูป
        </button>
        <p id="status" class="mt-8 text-gray-500 font-medium">รูปภาพจะถูกส่งไปแสดงบนหน้าจอ!</p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const photoInput = document.getElementById('photoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusTxt = document.getElementById('status');

        uploadBtn.onclick = () => photoInput.click();

        photoInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusTxt.innerText = "⏳ กำลังประมวลผลรูปภาพ...";
            statusTxt.className = "mt-8 text-blue-500 font-bold";
            uploadBtn.disabled = true;
            uploadBtn.classList.replace('bg-blue-600', 'bg-gray-400');

            try {
                // บีบอัดภาพเพื่อความรวดเร็วและแก้ปัญหาภาพกลับหัว
                const opt = { maxSizeMB: 0.5, maxWidthOrHeight: 1200, useWebWorker: true };
                const compressed = await imageCompression(file, opt);

                const reader = new FileReader();
                reader.readAsDataURL(compressed);
                reader.onloadend = async () => {
                    statusTxt.innerText = "🚀 กำลังอัปโหลด...";
                    await addDoc(collection(db, "photos"), {
                        url: reader.result,
                        timestamp: serverTimestamp()
                    });

                    statusTxt.innerText = "✅ ส่งสำเร็จแล้ว!";
                    statusTxt.className = "mt-8 text-green-600 font-bold";
                    
                    setTimeout(() => {
                        statusTxt.innerText = "ส่งรูปภาพเพิ่มได้เลย!";
                        statusTxt.className = "mt-8 text-gray-500 font-medium";
                    }, 3000);
                };
            } catch (err) {
                alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
                statusTxt.innerText = "ส่งไม่สำเร็จ";
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.classList.replace('bg-gray-400', 'bg-blue-600');
                photoInput.value = '';
            }
        };
    </script>
</body>
</html>
