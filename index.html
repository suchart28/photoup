<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งรูปภาพร่วมสนุก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
        <h1 class="text-2xl font-bold mb-6">📸 ส่งรูปขึ้นจอ</h1>
        
        <div class="mb-4 text-left">
            <label class="block text-gray-700 text-sm font-bold mb-2">คำบรรยาย (Caption):</label>
            <input type="text" id="captionInput" placeholder="พิมพ์ข้อความที่นี่..." 
                   class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <input type="file" id="photoInput" accept="image/*" class="hidden">
        
        <button id="uploadBtn" disabled class="bg-gray-400 text-white font-bold py-4 px-8 rounded-full w-full shadow-lg transition-all">
            กำลังโหลดระบบตรวจจับ...
        </button>
        
        <p id="status" class="mt-6 text-sm text-gray-600 min-h-[1.5rem]">ระบบกำลังเตรียมความพร้อม ⏳</p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const photoInput = document.getElementById('photoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const captionInput = document.getElementById('captionInput');
        const statusTxt = document.getElementById('status');
        
        let aiModel = null;

        // 1. โหลดโมเดล AI ทันทีที่เปิดหน้าเว็บ
        cocoSsd.load().then(model => {
            aiModel = model;
            uploadBtn.disabled = false;
            uploadBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            uploadBtn.classList.add('hover:bg-blue-700', 'active:scale-95');
            uploadBtn.innerText = "เลือกรูปภาพ / ถ่ายรูป";
            statusTxt.innerHTML = "พร้อมใช้งานแล้ว!";
        }).catch(err => {
            console.error("AI Load Error:", err);
            statusTxt.innerHTML = "⚠️ ไม่สามารถโหลดระบบคัดกรองได้";
        });

        uploadBtn.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusTxt.innerHTML = "กำลังให้ AI ตรวจสอบรูปภาพ... 🤖";
            statusTxt.className = "mt-6 text-sm text-blue-600 font-bold";
            uploadBtn.disabled = true;

            try {
                // สร้างออบเจ็กต์รูปภาพจำลองเพื่อส่งให้ AI ตรวจ
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async (event) => {
                    const imgElement = new Image();
                    imgElement.src = event.target.result;
                    
                    imgElement.onload = async () => {
                        // 2. ให้ AI สแกนรูปภาพ
                        const predictions = await aiModel.detect(imgElement);
                        
                        // ค้นหาว่าในรูปมีวัตถุประเภท "person" (คน) หรือไม่
                        const hasPerson = predictions.some(prediction => prediction.class === 'person');

                        if (!hasPerson) {
                            // ถ้าไม่มีคนในรูป ให้แจ้งเตือนและหยุดการทำงาน
                            statusTxt.innerHTML = "❌ กรุณาอัพโหลดเฉพาะภาพถ่ายคนเท่านั้น";
                            statusTxt.className = "mt-6 text-sm text-red-600 font-bold";
                            uploadBtn.disabled = false;
                            return; 
                        }

                        // 3. ถ้าผ่านการตรวจสอบ (มีคน) ค่อยย่อขนาดและส่งขึ้น Firebase
                        statusTxt.innerHTML = "ผ่าน! กำลังเตรียมรูปภาพ... ⏳";
                        
                        const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1280, useWebWorker: true };
                        const compressedFile = await imageCompression(file, options);

                        const compressReader = new FileReader();
                        compressReader.readAsDataURL(compressedFile);
                        compressReader.onloadend = async () => {
                            const base64data = compressReader.result;
                            
                            await addDoc(collection(db, "photos"), {
                                url: base64data,
                                caption: captionInput.value || "",
                                timestamp: serverTimestamp()
                            });

                            statusTxt.innerHTML = "✅ ส่งรูปภาพสำเร็จ!";
                            statusTxt.className = "mt-6 text-sm text-green-600 font-bold";
                            uploadBtn.disabled = false;
                            captionInput.value = "";
                        };
                    };
                };
            } catch (error) {
                console.error(error);
                statusTxt.innerHTML = "❌ เกิดข้อผิดพลาดในการตรวจสอบ";
                statusTxt.className = "mt-6 text-sm text-red-600 font-bold";
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
