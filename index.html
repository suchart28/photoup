<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อัปโหลดรูปภาพร่วมสนุก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
        <div class="text-6xl mb-4">📸</div>
        <h1 class="text-2xl font-bold mb-2">ส่งรูปขึ้นจอ</h1>
        <p class="mb-8 text-gray-500">เลือกรูปภาพหรือถ่ายรูปเพื่อแสดงบนเวที</p>
        
        <input type="file" id="photoInput" accept="image/*" class="hidden">
        <button id="uploadBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full w-full shadow-lg active:scale-95 transition-all text-lg">
            ถ่ายรูป / เลือกรูปภาพ
        </button>
        
        <p id="status" class="mt-6 text-sm text-gray-600 min-h-[1.25rem]"></p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const photoInput = document.getElementById('photoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusTxt = document.getElementById('status');

        uploadBtn.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusTxt.innerHTML = "กำลังเตรียมรูปภาพ... ⏳";
            statusTxt.className = "mt-6 text-sm text-blue-600 font-bold";
            uploadBtn.disabled = true;

            try {
                const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1280, useWebWorker: true };
                const compressedFile = await imageCompression(file, options);

                const reader = new FileReader();
                reader.readAsDataURL(compressedFile);
                reader.onloadend = async () => {
                    const base64data = reader.result;
                    await addDoc(collection(db, "photos"), {
                        url: base64data,
                        timestamp: serverTimestamp()
                    });

                    statusTxt.innerHTML = "✅ ส่งรูปภาพสำเร็จ!";
                    statusTxt.className = "mt-6 text-sm text-green-600 font-bold";
                    uploadBtn.disabled = false;
                    photoInput.value = ""; // Reset input
                };
            } catch (error) {
                statusTxt.innerHTML = "❌ เกิดข้อผิดพลาด";
                statusTxt.className = "mt-6 text-sm text-red-600 font-bold";
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
