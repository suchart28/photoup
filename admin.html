<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดการคิวรูปภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 p-8 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">ระบบจัดการคิวรูปภาพ ⚙️</h1>
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <p class="text-gray-500 col-span-full">กำลังโหลดรูปภาพ...</p>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const gallery = document.getElementById('gallery');

        // ดึงรูปที่อัปโหลดมาล่าสุดแบบ Real-time
        const q = query(collection(db, "photos"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            gallery.innerHTML = ''; // เคลียร์ของเก่าก่อน
            
            if(snapshot.empty) {
                gallery.innerHTML = '<p class="text-gray-500 col-span-full">ยังไม่มีรูปภาพเข้าสู่ระบบ</p>';
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                
                const card = document.createElement('div');
                card.className = "bg-white p-2 rounded-lg shadow flex flex-col";
                card.innerHTML = `
                    <div class="h-48 mb-2 overflow-hidden rounded">
                        <img src="${data.url}" class="w-full h-full object-cover">
                    </div>
                    <button class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded transition send-to-screen" data-url="${data.url}">
                        ส่งขึ้นจอใหญ่
                    </button>
                `;
                gallery.appendChild(card);
            });

            // ผูก Event ให้ปุ่ม "ส่งขึ้นจอใหญ่"
            document.querySelectorAll('.send-to-screen').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const imgUrl = e.target.getAttribute('data-url');
                    
                    try {
                        // สั่งอัปเดตไปที่ Document "main" ใน Collection "display"
                        await setDoc(doc(db, "display", "main"), {
                            currentImageUrl: imgUrl,
                            updatedAt: new Date()
                        });
                        
                        // แสดงสถานะว่าส่งแล้ว (เปลี่ยนสีปุ่มชั่วคราว)
                        const originalText = e.target.innerText;
                        e.target.innerText = "✅ ขึ้นจอแล้ว!";
                        e.target.classList.replace('bg-green-500', 'bg-blue-500');
                        setTimeout(() => {
                            e.target.innerText = originalText;
                            e.target.classList.replace('bg-blue-500', 'bg-green-500');
                        }, 2000);
                        
                    } catch (error) {
                        console.error("Error setting document: ", error);
                        alert("เกิดข้อผิดพลาดในการส่งรูปขึ้นจอ");
                    }
                });
            });
        });
    </script>
</body>
</html>
