<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin - คัดกรองภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-gray-800 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6">ใส่รหัสผ่านแอดมิน</h2>
            <input type="password" id="pinInput" placeholder="xxxxxx" maxlength="6" 
                   class="w-full p-4 border-2 border-gray-200 rounded-xl mb-4 text-center text-2xl tracking-[0.5em]">
            <button id="loginBtn" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-xl w-full">เข้าสู่ระบบ</button>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden">รหัสผ่านไม่ถูกต้อง</p>
        </div>
    </div>

    <div id="adminContent" class="hidden p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">ระบบคัดกรองภาพ ⚙️</h1>
                <button id="clearAllBtn" class="bg-red-600 text-white font-bold py-2 px-6 rounded-lg">ล้างทั้งหมด</button>
            </div>
            <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot, doc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const pinInput = document.getElementById('pinInput');
        const loginBtn = document.getElementById('loginBtn');
        const ADMIN_PIN = "878556";

        if (sessionStorage.getItem('adminAuth') === 'true') grantAccess();
        loginBtn.addEventListener('click', () => {
            if (pinInput.value === ADMIN_PIN) { sessionStorage.setItem('adminAuth', 'true'); grantAccess(); }
            else { document.getElementById('loginError').classList.remove('hidden'); pinInput.value = ''; }
        });

        function grantAccess() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
        }

        const gallery = document.getElementById('gallery');
        onSnapshot(query(collection(db, "photos"), orderBy("timestamp", "desc")), (snapshot) => {
            gallery.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-xl shadow-sm border border-gray-200 transition-opacity";
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" checked class="w-5 h-5 accent-green-600 del-toggle" data-id="${docSnap.id}">
                            <span class="ml-2 text-xs font-bold text-green-700">อนุญาตให้แสดง</span>
                        </label>
                    </div>
                    <div class="relative h-32 mb-2 rounded bg-gray-100 overflow-hidden">
                        <img src="${data.url}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 bg-black/50 text-white text-[10px] p-1 w-full truncate">${data.caption || ''}</div>
                    </div>
                    <button class="bg-blue-500 text-white w-full py-2 rounded font-bold text-xs send-btn" 
                            data-url="${data.url}" data-caption="${data.caption || ''}">ส่งขึ้นจอ</button>
                `;
                gallery.appendChild(card);
            });

            document.querySelectorAll('.del-toggle').forEach(chk => {
                chk.addEventListener('change', async (e) => {
                    if (!e.target.checked) {
                        e.target.closest('.bg-white').style.opacity = '0.3';
                        await deleteDoc(doc(db, "photos", e.target.dataset.id));
                    }
                });
            });

            document.querySelectorAll('.send-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    await setDoc(doc(db, "display", "main"), { 
                        currentImageUrl: e.target.dataset.url, 
                        caption: e.target.dataset.caption,
                        time: Date.now() 
                    });
                });
            });
        });

        document.getElementById('clearAllBtn').addEventListener('click', async () => {
            if (confirm("ลบรูปทั้งหมด?")) {
                const snap = await getDocs(collection(db, "photos"));
                snap.forEach(d => deleteDoc(doc(db, "photos", d.id)));
            }
        });
    </script>
</body>
</html>
