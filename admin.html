<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin - จัดการระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">จัดการคิวรูปภาพ ⚙️</h1>
            <button id="clearBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded shadow">
                ล้างฐานข้อมูลทั้งหมด
            </button>
        </div>

        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot, doc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const gallery = document.getElementById('gallery');
        const clearBtn = document.getElementById('clearBtn');

        // ฟังก์ชันลบข้อมูลทั้งหมด
        clearBtn.addEventListener('click', async () => {
            if (confirm("⚠️ คุณแน่ใจหรือไม่ที่จะลบรูปภาพทั้งหมด? ข้อมูลจะหายถาวร!")) {
                const querySnapshot = await getDocs(collection(db, "photos"));
                const deletePromises = querySnapshot.docs.map(docSnap => deleteDoc(doc(db, "photos", docSnap.id)));
                await Promise.all(deletePromises);
                alert("ล้างข้อมูลเรียบร้อยแล้ว");
            }
        });

        // ดึงรูปมาแสดง
        const q = query(collection(db, "photos"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            gallery.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const div = document.createElement('div');
                div.className = "bg-white p-2 rounded shadow";
                div.innerHTML = `
                    <img src="${data.url}" class="w-full h-32 object-cover rounded mb-2">
                    <button class="bg-green-500 w-full text-white text-xs py-1 rounded send-btn" data-url="${data.url}">ส่งขึ้นจอ</button>
                `;
                gallery.appendChild(div);
            });

            document.querySelectorAll('.send-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const url = e.target.getAttribute('data-url');
                    await setDoc(doc(db, "display", "main"), { currentImageUrl: url, time: Date.now() });
                });
            });
        });
    </script>
</body>
</html>
