<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ระบบจัดการรูปภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* เอฟเฟกต์โผล่ขึ้นมานุ่มๆ สำหรับรูปใหม่ */
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen text-white">

    <div id="loginOverlay" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">รหัสผ่านแอดมิน</h2>
            <input type="password" id="pinInput" placeholder="รหัส 6 หลัก" maxlength="6" 
                   class="w-full p-4 border-2 border-gray-200 rounded-xl mb-4 text-center text-2xl text-black">
            <button id="loginBtn" class="bg-blue-600 w-full py-4 rounded-xl font-bold">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="adminContent" class="hidden p-6">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-gray-700 pb-6 gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-blue-400">Admin Control Center ⚡</h1>
                    <p class="text-gray-400">โหลดภาพด้วยระบบ Lazy Load (เร็วและประหยัดเน็ต)</p>
                </div>
                <button id="clearAllBtn" class="bg-red-900/50 hover:bg-red-600 text-red-200 px-6 py-3 rounded-xl font-bold border border-red-700">
                    🗑️ ล้างรูปทั้งหมดในระบบ
                </button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl mb-8 border border-blue-500/30">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">📺 ตั้งค่าโหมดการแสดงผลหน้าจอ</h2>
                <div class="flex gap-4">
                    <button id="setModeLatest" class="flex-1 bg-gray-700 hover:bg-blue-600 py-4 rounded-xl font-bold transition-all border border-gray-600">
                        โหมด: สุ่ม 10 ภาพล่าสุด
                    </button>
                    <button id="setModeAll" class="flex-1 bg-gray-700 hover:bg-blue-600 py-4 rounded-xl font-bold transition-all border border-gray-600">
                        โหมด: สุ่มจากภาพทั้งหมด
                    </button>
                </div>
                <p id="currentModeStatus" class="mt-3 text-center text-blue-400 font-medium">สถานะปัจจุบัน: กำลังโหลด...</p>
            </div>

            <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, onSnapshot, doc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        // Login Logic
        const ADMIN_PIN = "878556";
        if (sessionStorage.getItem('adminAuth') === 'true') grantAccess();
        document.getElementById('loginBtn').addEventListener('click', () => {
            if (document.getElementById('pinInput').value === ADMIN_PIN) {
                sessionStorage.setItem('adminAuth', 'true');
                grantAccess();
            }
        });
        function grantAccess() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
        }

        // โหมดการแสดงผล
        const modeStatus = document.getElementById('currentModeStatus');
        onSnapshot(doc(db, "display", "config"), (docSnap) => {
            if (docSnap.exists()) {
                const mode = docSnap.data().mode;
                modeStatus.innerText = `สถานะปัจจุบัน: โหมดสุ่ม${mode === 'latest' ? ' 10 ภาพล่าสุด' : 'ภาพทั้งหมด'}`;
                document.getElementById('setModeLatest').className = mode === 'latest' ? 'flex-1 bg-blue-600 py-4 rounded-xl font-bold' : 'flex-1 bg-gray-700 py-4 rounded-xl font-bold';
                document.getElementById('setModeAll').className = mode === 'all' ? 'flex-1 bg-blue-600 py-4 rounded-xl font-bold' : 'flex-1 bg-gray-700 py-4 rounded-xl font-bold';
            }
        });

        document.getElementById('setModeLatest').onclick = () => setDoc(doc(db, "display", "config"), { mode: 'latest' });
        document.getElementById('setModeAll').onclick = () => setDoc(doc(db, "display", "config"), { mode: 'all' });

        // Gallery Logic (Optimized for Speed)
        const gallery = document.getElementById('gallery');
        
        // ดึงแค่ 60 รูปล่าสุดมาให้แอดมินดู (หน้าจอดิสเพลย์ยังดึงทั้งหมดตามปกติถ้าเปิดโหมด All)
        const q = query(collection(db, "photos"), orderBy("timestamp", "asc"), limit(60)); 
        // หมายเหตุ: ใช้ asc เพื่อให้เวลา insertBefore มันจะเรียงรูปล่าสุดไว้บนสุดพอดี

        onSnapshot(q, (snapshot) => {
            // ใช้ docChanges() เพื่ออัปเดตเฉพาะรูปที่เพิ่มหรือลบ ไม่ต้องโหลดใหม่ทั้งกระดาน
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const docId = change.doc.id;

                if (change.type === "added") {
                    const card = document.createElement('div');
                    card.id = `card-${docId}`; // ตั้ง ID ให้การ์ดเพื่อค้นหาและลบง่ายๆ
                    card.className = "bg-gray-800 rounded-xl overflow-hidden border border-gray-700 fade-in";
                    
                    // สังเกต loading="lazy" ที่แท็ก img
                    card.innerHTML = `
                        <div class="h-40 bg-black">
                            <img src="${data.url}" loading="lazy" class="w-full h-full object-cover">
                        </div>
                        <div class="p-2 grid gap-2">
                            <button class="bg-green-600 text-white py-1 rounded text-xs send-btn">ขึ้นจอทันที</button>
                            <button class="bg-red-600 text-white py-1 rounded text-xs delete-btn">ลบ</button>
                        </div>
                    `;
                    
                    // เอารูปใหม่แทรกไว้ด้านบนสุดเสมอ
                    gallery.insertBefore(card, gallery.firstChild);

                    // ใส่ Event ให้ปุ่มที่เพิ่งสร้าง
                    card.querySelector('.send-btn').onclick = () => setDoc(doc(db, "display", "main"), { currentImageUrl: data.url, time: Date.now() });
                    card.querySelector('.delete-btn').onclick = () => {
                        if (confirm("ลบรูปนี้?")) {
                            card.style.opacity = '0.3'; // ทำสีจางให้รู้ว่ากำลังลบ
                            deleteDoc(doc(db, "photos", docId));
                        }
                    };
                }

                // ถ้ารูปถูกลบออกจากฐานข้อมูล ให้เอากล่องนั้นออกจากหน้าจอ
                if (change.type === "removed") {
                    const cardToRemove = document.getElementById(`card-${docId}`);
                    if (cardToRemove) cardToRemove.remove();
                }
            });
        });

        // ล้างฐานข้อมูลทั้งหมด
        document.getElementById('clearAllBtn').onclick = async () => {
            if (confirm("ยืนยันลบรูปทั้งหมด?") && confirm("ย้ำอีกครั้ง! ลบหมดเลยนะ?")) {
                const snap = await getDocs(collection(db, "photos"));
                const deletePromises = snap.docs.map(d => deleteDoc(doc(db, "photos", d.id)));
                await Promise.all(deletePromises);
            }
        };
    </script>
</body>
</html>
